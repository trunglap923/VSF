# configs/qwen3guard_06b_lora_v1.yaml
# Cấu hình huấn luyện cho Qwen3Guard-Gen-0.6B SFT
# Yêu cầu: Sử dụng thư viện LLaMA-Factory hoặc cấu trúc tương tự (HuggingFace SFTTrainer)

# --- MODEL SETTINGS ---
model_name_or_path: "Qwen/Qwen3Guard-Gen-0.6B"
template: "qwen"
finetuning_type: "lora"

# --- DATASET SETTINGS ---
# Định dạng file input phải có trường "messages" với Role User/Assistant
dataset: "data/training/qwen3guard/train_sft_qwen3guard_v1.jsonl"
eval_dataset: "data/training/qwen3guard/val_sft_qwen3guard_v1.jsonl"
cutoff_len: 2048
max_samples: 100000

# --- LORA SETTINGS ---
lora_target: "all"
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
quantization_bit: 4 # Sử dụng QLoRA để tiết kiệm bộ nhớ GPU

# --- TRAINING ARGUMENTS ---
output_dir: "models/qwen3guard_06b_lora_v1"
learning_rate: 2.0e-5
num_train_epochs: 3.0
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
lr_scheduler_type: "cosine"
warmup_ratio: 0.1
bf16: true
fp16: false

# --- EVALUATION ---
eval_strategy: "steps"
eval_steps: 100
save_steps: 100
logging_steps: 10
load_best_model_at_end: true
metric_for_best_model: "eval_loss"

# --- SEED ---
seed: 42
